name: check-design

on:
  pull_request:
    paths:
      - ".github/workflows/check-design.yml"
      - "bin/**"
      - "design/**"
      - "package-lock.json"
      - "package.json"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
