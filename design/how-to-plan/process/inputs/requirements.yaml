- id: designs-live-in-git
  statement: a design is a file in git, iterated on with commits; it settles by review as a pull request
  rationale: |
    Chosen for what the medium affords rather than for git itself — an exact line to point
    at, an edit history attached to the reasoning, and a review surface an agent can use on
    the same terms I do.

- id: dead-entries-leave-a-marker
  statement: |
    an entry that is promoted, answered, or cut is deleted rather than kept in a closed
    state, leaving a comment where it stood; its id is never reused
  rationale: |
    A list I read end to end at review time must hold only live entries, and a tombstone
    that stays forever pads it. The comment preserves the fact that something was there, and
    retiring the id keeps every citation that ever pointed at it unambiguous.

