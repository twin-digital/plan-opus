- id: node-for-tooling
  statement: permanent scripts and tooling are written in Node.js unless the task requires otherwise
  force: soft
  rationale: |
    A standing personal convention applied across all projects. Bash only where no Node
    runtime is available or the task strongly favours it; another language only when Node
    genuinely cannot do the job. Applies to permanent tooling — one-off agent scripting is
    unconstrained.

- id: derived-implementer-view
  statement: |
    the artifact a spec's implementers build from is derived from the spec, not authored
    separately: the spec.md itself with its inline citation tokens stripped, augmented by a
    streamlined extraction of the decisions and requirements the spec is bound by. The spec's
    prose is the primary source — it tells the builder what to build and how; the extraction is
    a crib for the key commitments, and the facts and citation tokens are left out
  rationale: |
    The spec is the primary build document, so the builder reads it in full — minus the citation 
    tokens, which point at sources the builder does not have and exist only to check that 
    foundations were incorporated. The decisions and requirements are
    also pulled into a streamlined list. Facts stay out — they
    are the evidence behind the claims, a review concern, not a build input. The view is derived
    rather than hand-authored so it cannot drift from its spec.

- id: settle-publishes-a-versioned-bundle
  statement: |
    when a settled spec is merged to main, the harness publishes that spec's builder bundle —
    the derived-implementer-view — and records a semantic-version tag for that spec. Each spec
    carries its own version line; there is no single repo-wide version
  rationale: |
    Implementers build against the derived view, not the spec, so they need a stable, versioned
    artifact to pin to — and the moment a spec settles is the moment it licenses building, which
    makes it the natural trigger to publish the bundle and stamp a version. Per-spec versioning
    because specs settle and change independently; one repo-wide version would churn every
    spec's pin whenever any single spec moved. The bundle's contents are fixed by
    derived-implementer-view; the version-bump policy, the tag format, and where the bundle is
    published are this design's to settle.

- id: in-repo-source-urls-resolve
  statement: |
    a fact source whose url is an in-repo path — one carrying no external scheme — must point
    at a file that exists in the repository; the checker rejects a source url that resolves to
    no file
  rationale: |
    An in-repo source is only evidence if the file is actually there. Unlike an external link,
    an in-repo path can be resolved for free at check time, so a dead one is a hard error rather
    than a silently weaker fact.

- id: in-repo-quotes-match-their-source
  statement: |
    where an in-repo fact source carries a quote, that quote must be found in the referenced
    file, matching the file's text up to whitespace and line breaks; the checker rejects a quote
    its source does not contain
  rationale: |
    This is what keeps a cross-design dependency expressed as a quote-fact from drifting: when an
    upstream spec's wording changes, the stale quote fails the check in the same change that broke
    it, rather than lingering as a confident but false claim. It is the extra strength an in-repo
    source has over an external one that cannot be fetched at check time — the quote is verified,
    not trusted. Matching is up to whitespace and line breaks because a block scalar and a
    line-wrapped source hold the same text differently; how tolerant to be is this design's to
    settle.

- id: wip-uncited-content-metrics
  statement: |
    When reviewing a spec, contributors have access to automated metrics that can be used to
    assess the amount of uncited material it contains. Exact metrics are not prescribed but
    might include measurements of amount of text between citations, % of cited/uncited sentences
    or paragraphs, etc.
  rationale: |
    The semantic rule that "all foundational claims" are cited cannot be mechanically enforced.
    Nor does it make sense to add hard gates on citations. But as an input for reviewers to
    consider it makes sense. And the automation opens the gate to building baselines to compare
    against.
