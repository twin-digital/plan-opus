# Decisions for the authoring design. Each is proposed until the owner accepts in review.
# Schema: id, statement, status (proposed|accepted|tolerated|rejected), falsifiers.

- id: reason-only-where-a-builder-needs-it
  statement: |
    the spec states what to build and how, and gives a reason only where a builder needs it to
    build the thing correctly — motivation for its own sake stays out
  status: proposed
  falsifiers:
    - builders routinely misbuild at points where the spec gave the what and how but withheld the
      why, showing that reason was needed to build correctly and should not have been cut
    - reviewers cannot follow a spec's structure without the omitted reasoning, so the terse form
      costs more review attention than the prose it removed

- id: quote-is-the-shortest-carrying-span
  statement: |
    an evidence quote is the shortest verbatim span that still carries the claim it backs, not the
    whole surrounding passage
  status: proposed
  falsifiers:
    - claims routinely need so much surrounding context that a minimal span misrepresents the
      source, forcing quotes back to full paragraphs
    - reviewers cannot judge a source from the short span and open the link anyway, so the trimming
      saves no verification effort

- id: falsifier-names-a-firing-condition
  statement: |
    a real falsifier names a concrete condition that could be observed to fire and reopen the
    decision, not a restatement of the decision or a rhetorical hedge
  status: proposed
  falsifiers:
    - a class of weighty decision recurs whose only truthful falsifier is a restatement, showing the
      firing-condition bar cannot always be met
    - decisions that pass this bar still get overturned on taste as often as those that fail it,
      showing a stated firing condition does not make a decision more reviewable

- id: a-convention-decision-fires-on-its-own-cost
  statement: |
    a decision that picks among near-equivalent options for consistency states its falsifier as the
    condition under which the convention's own cost outweighs the benefit it buys
  status: proposed
  falsifiers:
    - a convention decision appears whose overhead can never exceed its benefit, so a self-cost
      falsifier can only be fiction and the decision stands unfalsifiably
    - authors satisfy the form with self-cost conditions that could not occur in practice, making the
      rule ceremony rather than a guard

- id: components-cut-at-dispatchable-boundaries
  statement: |
    components are cut so each is one dispatchable build task with its interface to the others pinned
    well enough for parallel build, and the count stays bounded with serial dependencies marked
  status: proposed
  falsifiers:
    - parallel builds of separately dispatched components routinely fail to integrate because the
      boundary as drawn did not pin the interface between them
    - components are routinely split or merged mid-implementation, showing the authoring-time cut did
      not match the unit a builder can actually take on alone
