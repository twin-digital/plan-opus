# Requirements scoped to the authoring design.
# Schema: id, statement, force (hard|soft), status (active|retired), rationale (optional).
# rationale is always a block scalar. Requirements take no sources.
# Promote to design/how-to-plan/requirements.yaml when a second design depends on one.

- id: decisions-state-their-falsifier
  statement: a decision that cannot say what would prove it wrong is not reviewable, and does not belong on the list
  rationale: |
    Asking an agent to justify a choice invites confident nonsense; asking what would
    falsify it invites something checkable. A decision with no statable falsifier is not
    understood well enough to keep.

    The format can only require that the field be filled in. Whether what is in it could
    ever actually fire is a judgement, which is why this is an authoring requirement rather
    than a structural one.

- id: evidence-is-verbatim
  statement: |
    evidence is reproduced, never summarized — a fact's source carries the verbatim passage
    its claim rests on, and anything offered in support of a claim anywhere else is a
    quotation rather than a paraphrase
  rationale: |
    A paraphrase is the agent's voice, which is the exact thing a citation is supposed to
    guard against. A verbatim span is not in anyone's voice and is checkable at a glance. It
    also beats a summary at the practical job: a bare link to a long page proves nothing,
    because re-verifying means re-reading the page.

    The rule is a forcing function, not bookkeeping. Being made to produce the passage
    helps resist hallucinations or overstating what a source actually says.
