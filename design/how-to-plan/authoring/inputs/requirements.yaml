# Requirements scoped to the authoring design.
# Schema: id, statement, force (hard|soft), status (active|retired), rationale (optional).
# rationale is always a block scalar. Requirements take no sources.
# Promote to design/how-to-plan/requirements.yaml when a second design depends on one.

- id: decisions-state-their-falsifier
  statement: a decision that cannot say what would prove it wrong is not reviewable, and does not belong on the list
  rationale: |
    Asking an agent to justify a choice invites confident nonsense; asking what would
    falsify it invites something checkable. A decision with no statable falsifier is not
    understood well enough to keep.

    The format can only require that the field be filled in. Whether what is in it could
    ever actually fire is a judgement, which is why this is an authoring requirement rather
    than a structural one.

- id: evidence-is-verbatim
  statement: |
    evidence is reproduced, never summarized — a fact's source carries the verbatim passage
    its claim rests on, and anything offered in support of a claim anywhere else is a
    quotation rather than a paraphrase
  rationale: |
    A paraphrase is the agent's voice, which is the exact thing a citation is supposed to
    guard against. A verbatim span is not in anyone's voice and is checkable at a glance. It
    also beats a summary at the practical job: a bare link to a long page proves nothing,
    because re-verifying means re-reading the page.

    The rule is a forcing function, not bookkeeping. Being made to produce the passage
    helps resist hallucinations or overstating what a source actually says.

- id: the-argument-is-a-derivation
  statement: |
    the prose is ordered so each claim rests on ground already laid — it leads from the
    fixed foundations a design is handed, the facts and requirements, to the choices those
    force, rather than presenting its schemas as a catalogue and leaving the reader to
    reconstruct why they take the shape they do
  rationale: |
    Two blind regenerations of the same design produced the same content in different
    orders; the one that read as a derivation from its constraints was markedly clearer than
    the one that opened with a list. The inputs allow good order but do not compel it, so it
    has to be stated. A design a reader cannot follow top to bottom is a design whose
    coherence only its author can see, which is the failure the citation scheme already
    fights at the level of the single claim, raised to the level of the whole document.

- id: a-design-opens-by-orienting
  statement: |
    a design opens by naming what it is and the constraint that shapes it, before any schema
    or rule; the reader should know why the design takes the form it does before meeting the
    form
  rationale: |
    The strongest regeneration began by deriving the whole format from the medium it lives
    in — git, a rendering that strips styling — so every later choice arrived as a
    consequence rather than a decree. An opening that states the framing lets a reviewer
    judge each rule against the pressure that produced it; an opening that starts in the
    middle forces them to hold the rules in suspension until the justification eventually
    arrives, if it does.
