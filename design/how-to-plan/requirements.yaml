- id: easily-reviewable-foundations
  statement: |
    All design docs should be built on a concrete list of concise, easily-reviewable foundations: 
      
      - facts: things known (or reasonably assumed) to be true, with supporting evidence
      - requirements: invariants which must be maintained due to system owner fiat
      - decisions: details litigated during the design process; may not contradict facts or requirements
  rationale: |
    - Evidence requirements avoids false LLM confidence
    - Easier to review short list of items than volume of design prose or dozens of source files
    - Supports vision.md §Principles (1) and (2)

- id: explicit-intent
  statement: |
    a claim states what it rests on — a fact, requirement, or decision — whenever some
    decision, component, or other claim in the design would have to change were it false.
    Every citation in a design must belong to such a claim.
  rationale: |
    Supports vision.md §Principles (3)

    Both directions matter. Citing every sentence satisfies the first half and destroys the
    point: a document where every claim is cited signals as much as one where none is, and a
    citation on filler is a false signal rather than extra rigour.

    That test is what the requirement turns on, so it sits in the statement. Motivation,
    illustration, restatement of something already cited, and editorial asides all fail the
    test. When it is genuinely unclear, cut the sentence and see whether the specification has a
    hole or merely less colour. Citation is the obligation, not the notation — how the
    pointer is written is a separate choice.
