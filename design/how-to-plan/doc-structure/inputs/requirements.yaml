# Requirements scoped to the doc-structure design.
# Schema: id, statement, force (hard|soft), status (active|retired), rationale (optional).
# rationale is always a block scalar. Requirements take no sources.
# Promote to design/how-to-plan/requirements.yaml when a second design depends on one.

- id: foundations-are-expressible
  statement: |
    a design is built on exactly three kinds of foundation — facts, requirements, and
    decisions — each expressible in a fixed form a reader can recognise without being told
    which kind they are looking at
  rationale: |
    The general capability everything else rests on. What each kind must carry is refined by
    fact-structure, requirement-structure, and decision-structure; this one fixes that there
    are three, that the set is closed, and that they are distinguishable on sight.

- id: fact-structure
  statement: |
    Facts MUST have the following data at a minimum:
  
      - stable id to reference
      - a statement detailing the fact
      - how the fact was verified, confirmed, derived, etc. (directly tested, read from documentation, assumed via experience, etc.);
        different mechanisms may not all carry equal weight
      - whether the fact holds or has been disproven/superseded
      - sources, which may be either:
        - a description of the mechanism by which the fact was determined, or 
        - a URL reference to an online source (documentation, test results, etc.), which must also include a direct quote and pointer to the relevant section(s) of the source

- id: requirement-structure
  statement: |
    Requirements MUST have the following data at a minimum:
  
      - stable id to reference
      - a statement describing the requirement
      - whether the item is a non-negotiable or hard requirement, or expresses a preference that can bend if justified 
        (defaults to hard requirement)
      - an optional rationale clarifying the intent or importance of the requirement

- id: decision-structure
  statement: |
    Decisions MUST have the following data at a minimum:
  
      - stable id to reference
      - a statement detailing the decision
      - conditions which, if true, would invalidate the decision or require it to be revised
      - status of the decision: 
        - proposed: created (by an agent, presumably) but not yet ratified
        - accepted: an agreed part of the design which future iterations should maintain
        - rejected: considered, but turned down

- id: foundation-default-fields
  statement: |
    The structure of facts, requirements, and decisions should favor brevity when possible. Schemas for these types SHOULD
    provide default values for any fields where a logical default exists, allowing them to be omitted from documents.
  force: soft

- id: foundations-enter-settled
  statement: |
    facts and requirements are inputs to a design rather than products of it: a design may
    apply them, or find it cannot satisfy them, but does not reopen them as matters of
    opinion. A fact yields to evidence; a requirement yields to the owner
  rationale: |
    Without this the review has no floor. If every fact and requirement is arguable while
    the design is being argued, there is nothing to stand on and review becomes an unbounded
    negotiation. Evidence can still kill a fact and the owner can still change a requirement; 
    but neither happens because a design found it inconvenient.

- id: decisions-belong-to-their-design
  statement: |
    a decision is scoped to the design that makes it — reopened freely while that design is
    still being worked out, gone when it is thrown away, and never binding on another design
    facing the same question
  rationale: |
    Two competent designs can answer the same question differently and both be right, which
    is what separates a decision from a requirement. Treating decisions as durable would
    quietly convert one design's judgement into everyone's constraint.

- id: claims-can-cite-foundations
  statement: |
    a claim in the prose can point at the foundation it rests on, and that pointer resolves
    to exactly one entry without the reader having to search for it
  rationale: |
    The affordance, not the obligation. How much of a design must be cited is a question
    about how the format gets used, and belongs to process and authoring; this requires only
    that citing be possible and unambiguous when someone does it.
