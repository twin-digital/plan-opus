- id: foundations-are-expressible
  statement: |
    a design is built on exactly three kinds of foundation — facts, requirements, and
    decisions — each expressible in a fixed form a reader can recognise without being told
    which kind they are looking at
  rationale: |
    Says the kinds exist and what each records; it does not say when an author must write
    one, or whether what they wrote is any good.

- id: fact-structure
  statement: |
    Facts MUST carry these fields:

      - a stable, kebab-case `id`
      - a `claim` stating the fact
      - a `backing` naming how the fact was established — exactly one of
        `tested` | `documented` | `assumed`; the three may not carry equal weight
      - `sources`, at least one, each in exactly one locator form:
        - a `description` of the mechanism by which the fact was determined, or
        - a `url` to an online source, which must also carry `where` (a pointer to the
          relevant section) and a verbatim `quote`

    and MAY carry:

      - a `status` of `active` | `retired` (default `active`); a retired fact adds a
        `reason` of `superseded` | `disproven` | `stale`, and a superseded one names its
        replacement in `superseded_by`
      - a `caveat`: why the fact might not hold despite its backing — an argument from
        absence, a single source, evidence gathered by the party it suits
  rationale: |
    Field names and enum values are the format's public interface. The spec's Entry shapes
    and Examples sections show each field in the form it takes on disk.

- id: requirement-structure
  statement: |
    Requirements MUST carry:

      - a stable, kebab-case `id`
      - a `statement` describing the requirement

    and MAY carry:

      - a `force` of `hard` | `soft` (default `hard`): a hard requirement is
        non-negotiable, a soft one a preference that can bend if justified
      - a `status` of `active` | `retired` (default `active`)
      - a `rationale` clarifying the requirement's intent or importance
  rationale: |
    Field names and enum values are the format's public interface. The spec's Entry shapes
    and Examples sections show each field in the form it takes on disk.

- id: decision-structure
  statement: |
    Decisions MUST carry:

      - a stable, kebab-case `id`
      - a single-line `statement` naming what was chosen — not why, and not what it entails
      - `falsifiers`: a list of conditions which, if true, would invalidate the decision or
        require it to be revised (a rejected decision needs none)
      - a `status`, exactly one of:
        - `proposed`: created (by an agent, presumably) but not yet ratified
        - `accepted`: an agreed part of the design which future iterations should maintain
        - `tolerated`: cleared to proceed but not endorsed — the owner does not object and does not
          mind whether it stays, so a later author may rework it freely
        - `rejected`: considered, but turned down

- id: foundation-default-fields
  statement: |
    The structure of facts, requirements, and decisions should favor brevity when possible. Schemas for these types SHOULD
    provide default values for any fields where a logical default exists, allowing them to be omitted from documents.
  force: soft

- id: foundations-enter-settled
  statement: |
    facts and requirements are inputs to a design rather than products of it: a design may
    apply them, or find it cannot satisfy them, but does not reopen them as matters of
    opinion. A fact yields to evidence; a requirement yields to the owner
  rationale: |
    Without this the review has no floor: if every fact and requirement is arguable while the
    design is being argued, there is nothing to stand on.

- id: decisions-belong-to-their-design
  statement: |
    a decision is scoped to the design that makes it — reopened freely while that design is
    still being worked out, gone when it is thrown away, and never binding on another design
    facing the same question
  rationale: |
    Two competent designs can answer the same question differently and both be right, which is
    what separates a decision from a requirement. It is also what makes a design safe to throw
    away.

- id: claims-can-cite-foundations
  statement: |
    a claim in the prose can point at the foundation it rests on, and that pointer resolves
    to exactly one entry without the reader having to search for it
  rationale: |
    The affordance, not the obligation — how much of a design must be cited belongs to process
    and authoring. "Resolves to exactly one entry" carries the weight: a pointer that needs
    interpretation cannot be checked.

- id: citable-entries-are-foundations
  statement: |
    only the three foundation kinds — facts, requirements, and decisions — may be cited by a
    claim, and each lives in a YAML file: facts and requirements in a design's own dir or a
    wider scope, decisions in a decisions.yaml beside the spec.md. Components and open
    questions live in the document but are never cited
  rationale: |
    Citing only foundations keeps a citation meaning "this rests on something settled", and
    keeping every citable kind in a YAML file means every citation resolves the same way —
    to an entry in a file — rather than some pointing into the prose and some out of it.

- id: three-tier-scopes
  statement: |
    exactly three scopes hold foundations — global, area, and design — each a directory
    holding at most a requirements.yaml and a facts.yaml. There is no fourth tier and areas
    do not nest
  rationale: |
    Two tiers cannot express "shared by these designs but not by everything"; a fourth invites
    a hierarchy that will grow unwieldly

- id: inputs-outputs-split
  statement: |
    a design directory separates its durable inputs from its regenerable outputs by file, not
    by folder. Facts and requirements are inputs and live in a design's own requirements.yaml
    and facts.yaml or a wider scope; decisions, components, and open questions are outputs,
    produced by the design and written only into its decisions.yaml or its spec.md, never into
    an input file

- id: ids-unique-per-kind
  statement: |
    within a kind an id is unique across all three scopes; an id repeated at a nearer scope
    is an error rather than an override. An entry whose meaning changes gets a new id rather
    than a rewritten one
  rationale: |
    Shadowing would make a citation mean different things depending on where it was written.
    Stability is the half no machine can check — a rename and a replacement are the same diff.

- id: design-status-enum
  statement: |
    a design is in one of three states — exploring, draft, or settled — and the state is
    derivable from what exists in the tree rather than stored beside it. Which transitions
    are legal, and who makes them, belongs to process
  rationale: |
    Reading the state off the artifacts keeps it from drifting the way a stored copy would.

- id: component-structure
  statement: |
    Components MUST have the following data at a minimum:

      - stable id to reference
      - one line naming the responsibility it holds

    and MAY additionally carry the nearby responsibility it deliberately does not hold, and
    the components that must land before it
  rationale: |
    What a component excludes is the cheapest way to state a boundary, since a boundary is
    defined by its far side. Anything else belongs in the specification that introduces it.

- id: question-structure
  statement: |
    Open questions MUST have the following data at a minimum:

      - stable id to reference
      - the question
      - which kind of foundation would close it — a fact, a requirement, or a decision

    and MAY additionally carry the decisions it gates. A question is not a foundation: no
    claim may rest on one
  rationale: |
    Naming the foundation that would close it turns a question into work with a known shape.
    Citing one would otherwise let an author acknowledge an uncertainty and call the citing done.

- id: soft-departures-are-decisions
  statement: |
    a design that departs from a soft requirement records the departure as a decision citing
    that requirement; the requirement is not amended and carries no exception field
  rationale: |
    Bending a soft requirement is a design choice with a reason and a falsifier — exactly a
    decision — so it belongs with the design's other reasoning, not annotated onto the fiat.

- id: enable-easy-capture
  statement: |
    a fact or requirement discovered outside the scope of the design that will use it keeps a home in the repo; knowledge 
    is never parked on a branch or in my head for want of somewhere to put it
  rationale: |
    Enabling easy capture of good ideas or future requirements prevents losing good ideas without forcing frequent
    context switches to act on them.

- id: only-settled-work-licenses-building
  statement: |
    nothing is built on a design that has not cleared review; a design's status says what it
    licenses, and only settled licenses construction. A design cannot be settled while it
    holds an open question or a decision still proposed; a rejected decision blocks nothing,
    being a record of an option considered rather than something the design holds

- id: invariants-are-enforced-or-marked
  statement: |
    every invariant a design states is either enforced by the harness, or carries an
    explicit note that it has no mechanical backstop; nothing the harness enforces is
    also reviewed by hand
  rationale: |
    The concrete obligation behind vision.md §Principles (4). "Let machines catch what they
    can" is a principle, not something a design can satisfy or fail; this is the version
    with a testable edge — read any stated invariant and ask which of the two it is. An
    invariant that is neither enforced nor marked is the gap, and the marked ones are worth
    counting — a format that keeps growing unbacked rules has outrun what can be checked.

- id: settled-design-cites-what-it-keeps
  statement: |
    a design cannot be settled while a live design-scoped requirement, or an accepted or
    tolerated decision, has no claim in the design citing it. Facts, and requirements at wider
    scopes, carry no such obligation
  rationale: |
    Replaces the standing reachability check, which fought enable-easy-capture by rejecting
    any foundation nothing cited yet. Capture is now free at every scope and at any time; the
    only citation obligation is at settle, and only for the two things a settled design must
    actually stand on — its own requirements and the decisions it kept. Design-scoped only,
    because a requirement at a wider scope may be honoured by a sibling design rather than
    this one; facts are exempt because an uncited fact is available knowledge, not an ignored
    obligation. A departed-from soft requirement is still cited, by the decision that records
    the departure.

- id: citation-token-grammar
  statement: a citation is `[[<k>:<id>]]` with a single-letter kind — `f` fact, `r`
    requirement, `d` decision

- id: fixed-outer-sections
  statement: a spec.md opens with Summary then the specification; an Open questions section
    (just after Summary) and a Components section (at the end) appear only when the design has
    entries of that kind; decisions sit in decisions.yaml, not in the document

- id: one-block-per-kind
  statement: components and open questions each appear in exactly one fenced block in a
    spec.md

- id: blocks-are-keyed-mappings
  statement: each fenced block in a spec.md is a YAML mapping with exactly one top-level
    key naming its kind

- id: resolution-is-scope-blind
  statement: a token resolves by matching its id against every entry of that kind in all
    three scopes; exactly one match is required and any other count is an error
  rationale: |
    Scope-blind resolution holds only while ids stay unique per kind; without that
    guarantee it would need a precedence rule.

- id: ids-unique-repo-wide
  statement: an id is unique per kind across the whole repository, not merely across the
    three scopes one design can see

- id: facts-require-a-source
  statement: every fact carries at least one source, and each source uses exactly one
    locator form — a mechanism description, or a URL with section and quote

- id: repo-relative-source-paths
  statement: a source URL that points inside this repository is written relative to the
    repo root, not relative to the file that holds it

- id: quote-is-block-scalar
  statement: |
    a source `quote` is always written as a block scalar (`quote: |`), even for a single line

- id: status-derived-from-content
  statement: |
    a design's state is computed from its artifacts — no spec.md is exploring; a
    spec.md with a proposed decision, an open question, or an uncited live design-scoped
    requirement or accepted-or-tolerated decision is draft; a design merged to main with none of those is
    settled

- id: decisions-require-a-falsifier
  statement: a decision must list at least one falsifier

- id: defaults-are-omitted
  statement: every field with a sensible default is optional and omitted when it takes that
    default, except a decision's status, which is always written even at proposed

- id: rejected-decisions-are-closed
  statement: a rejected decision is retained as a record, blocks nothing, and may not be
    cited
