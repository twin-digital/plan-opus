- id: foundations-are-expressible
  statement: |
    a design is built on exactly three kinds of foundation — facts, requirements, and
    decisions — each expressible in a fixed form a reader can recognise without being told
    which kind they are looking at
  rationale: |
    Says the kinds exist and what each records; it does not say when an author must write
    one, or whether what they wrote is any good.

- id: fact-structure
  statement: |
    Facts MUST have the following data at a minimum:
  
      - stable id to reference
      - a statement detailing the fact
      - how the fact was verified, confirmed, derived, etc. (directly tested, read from documentation, assumed via experience, etc.);
        different mechanisms may not all carry equal weight
      - a status of active or retired (default active); a retired fact names why it was
        retired — superseded (a better fact replaced it, which it names), disproven (shown
        false), or stale (its evidence no longer holds up)
      - an optional caveat: why this fact might not hold despite its backing — an argument
        from absence, a single source, evidence gathered by the person it suits
      - sources, which may be either:
        - a description of the mechanism by which the fact was determined, or 
        - a URL reference to an online source (documentation, test results, etc.), which must also include a direct quote and pointer to the relevant section(s) of the source

- id: requirement-structure
  statement: |
    Requirements MUST have the following data at a minimum:
  
      - stable id to reference
      - a statement describing the requirement
      - whether the item is a non-negotiable or hard requirement, or expresses a preference that can bend if justified 
        (defaults to hard requirement)
      - an optional rationale clarifying the intent or importance of the requirement

- id: decision-structure
  statement: |
    Decisions MUST have the following data at a minimum:
  
      - stable id to reference
      - a single-line statement naming what was chosen — not why, and not what it entails
      - list of conditions which, if true, would invalidate the decision or require it to be revised
      - status of the decision: 
        - proposed: created (by an agent, presumably) but not yet ratified
        - accepted: an agreed part of the design which future iterations should maintain
        - tolerated: cleared to proceed but not endorsed — the owner does not object and does not
          mind whether it stays, so a later author may rework it freely
        - rejected: considered, but turned down

- id: foundation-default-fields
  statement: |
    The structure of facts, requirements, and decisions should favor brevity when possible. Schemas for these types SHOULD
    provide default values for any fields where a logical default exists, allowing them to be omitted from documents.
  force: soft

- id: foundations-enter-settled
  statement: |
    facts and requirements are inputs to a design rather than products of it: a design may
    apply them, or find it cannot satisfy them, but does not reopen them as matters of
    opinion. A fact yields to evidence; a requirement yields to the owner
  rationale: |
    Without this the review has no floor: if every fact and requirement is arguable while the
    design is being argued, there is nothing to stand on.

- id: decisions-belong-to-their-design
  statement: |
    a decision is scoped to the design that makes it — reopened freely while that design is
    still being worked out, gone when it is thrown away, and never binding on another design
    facing the same question
  rationale: |
    Two competent designs can answer the same question differently and both be right, which is
    what separates a decision from a requirement. It is also what makes a design safe to throw
    away.

- id: claims-can-cite-foundations
  statement: |
    a claim in the prose can point at the foundation it rests on, and that pointer resolves
    to exactly one entry without the reader having to search for it
  rationale: |
    The affordance, not the obligation — how much of a design must be cited belongs to process
    and authoring. "Resolves to exactly one entry" carries the weight: a pointer that needs
    interpretation cannot be checked.

- id: citable-entries-are-foundations
  statement: |
    only the three foundation kinds — facts, requirements, and decisions — may be cited by a
    claim, and each lives in a YAML file: facts and requirements in a design's own dir or a
    wider scope, decisions in a decisions.yaml beside the spec.md. Components and open
    questions live in the document but are never cited
  rationale: |
    Citing only foundations keeps a citation meaning "this rests on something settled", and
    keeping every citable kind in a YAML file means every citation resolves the same way —
    to an entry in a file — rather than some pointing into the prose and some out of it.

- id: three-tier-scopes
  statement: |
    exactly three scopes hold foundations — global, area, and design — each a directory
    holding at most a requirements.yaml and a facts.yaml. There is no fourth tier and areas
    do not nest
  rationale: |
    Two tiers cannot express "shared by these designs but not by everything"; a fourth invites
    a hierarchy that will grow unwieldly

- id: inputs-outputs-split
  statement: |
    a design directory separates its durable inputs from its regenerable outputs by file, not
    by folder. Facts and requirements are inputs and live in a design's own requirements.yaml
    and facts.yaml or a wider scope; decisions, components, and open questions are outputs,
    produced by the design and written only into its decisions.yaml or its spec.md, never into
    an input file

- id: ids-unique-per-kind
  statement: |
    within a kind an id is unique across all three scopes; an id repeated at a nearer scope
    is an error rather than an override. An entry whose meaning changes gets a new id rather
    than a rewritten one
  rationale: |
    Shadowing would make a citation mean different things depending on where it was written.
    Stability is the half no machine can check — a rename and a replacement are the same diff.

- id: design-status-enum
  statement: |
    a design is in one of three states — exploring, draft, or settled — and the state is
    derivable from what exists in the tree rather than stored beside it. Which transitions
    are legal, and who makes them, belongs to process
  rationale: |
    Reading the state off the artifacts keeps it from drifting the way a stored copy would.

- id: component-structure
  statement: |
    Components MUST have the following data at a minimum:

      - stable id to reference
      - one line naming the responsibility it holds

    and MAY additionally carry the nearby responsibility it deliberately does not hold, and
    the components that must land before it
  rationale: |
    What a component excludes is the cheapest way to state a boundary, since a boundary is
    defined by its far side. Anything else belongs in the argument that introduces it.

- id: question-structure
  statement: |
    Open questions MUST have the following data at a minimum:

      - stable id to reference
      - the question
      - which kind of foundation would close it — a fact, a requirement, or a decision

    and MAY additionally carry the decisions it gates. A question is not a foundation: no
    claim may rest on one
  rationale: |
    Naming the foundation that would close it turns a question into work with a known shape.
    Citing one would otherwise let an author acknowledge an uncertainty and call the citing done.

- id: soft-departures-are-decisions
  statement: |
    a design that departs from a soft requirement records the departure as a decision citing
    that requirement; the requirement is not amended and carries no exception field
  rationale: |
    Bending a soft requirement is a design choice with a reason and a falsifier — exactly a
    decision — so it belongs with the design's other reasoning, not annotated onto the fiat.

