- id: yaml-entries-markdown-prose
  statement: entries are YAML; the prose around them is ordinary markdown
  status: accepted
  falsifiers:
    - an entry kind needs a field that YAML cannot carry legibly at one entry per screen
    - authors routinely hand-edit blocks into invalid YAML, making the artifact unreadable
      by the harness more often than it is readable

- id: decisions-precede-the-spec
  statement: the decision list is placed before the prose that draws on it
  status: rejected
  falsifiers:
    - a decision statement turns out to be unintelligible before the prose that uses it, so
      readers must jump forward and back to use the list

- id: no-authorship-fields
  statement: no entry carries an author, date, or revision field
  status: accepted
  falsifiers:
    - entries start arriving through a path that version control does not record
    - a rule needs an entry's age, and reading it from history proves impractical

- id: structure-in-plain-text
  statement: all structure is carried by markdown text — fences, headings, and bracket
    tokens — with no HTML or styling
  status: accepted
  falsifiers:
    - the artifact stops being read on GitHub, and the renderer that replaces it supports
      richer markup

- id: brief-is-required
  statement: a design directory must hold `brief.md`
  status: rejected
  falsifiers:
    - a design appears whose subject is fully determined by its requirements, making the
      brief pure restatement
